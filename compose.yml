name: tyr-lab

networks:
  tyr-lab-net:
    name: tyr-lab-net
  lan:
    driver: ipvlan
    driver_opts:
      parent: ${NETWORK_INTERFACE}
      ipvlan_mode: l2
    ipam:
      config:
        - subnet: ${LOCAL_SUBNET}
          gateway: ${LOCAL_GATEWAY}

services:
  tyr-lab-dockerproxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:latest
    container_name: tyr-lab-dockerproxy
    environment:
      - CONTAINERS=1  # Allow access to viewing containers
      - SERVICES=1    # Allow access to viewing services (Swarm)
      - TASKS=1       # Allow access to viewing tasks (Swarm)
      - POST=0        # Disallow any POST operations (read-only)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - tyr-lab-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:2375/version"]

  # This container can be transformed into a VPN-container, to enable VPN for everything.
  tyr-lab-gateway:
    image: alpine:latest
    command: sleep infinity
    container_name: tyr-lab-gateway
    restart: unless-stopped
    networks:
      - tyr-lab-net
    ports:
      - ${SONARR_PORT}:8989
      - ${RADARR_PORT}:7878
      - ${BAZARR_PORT}:6767
      - ${PROWLARR_PORT}:9696
      - ${QBITTORRENT_WEBUI_PORT}:8080
      - ${QBITTORRENT_TORRENTING_PORT}:6881
      - ${QBITTORRENT_TORRENTING_PORT}:6881/udp
      - ${SEERR_PORT}:5055
      - ${JELLYFIN_PORT}:8096
      - ${JELLYSTAT_PORT}:3000
      - ${KAPOWARR_PORT}:5656
      - ${KAVITA_PORT}:5000
      - 8920:8920     # Jellyfin optional
      - 7359:7359/udp # Jellyfin optional
      - 1900:1900/udp # Jellyfin optional
    healthcheck:
      test: ["CMD", "true"]

  tyr-lab-homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: tyr-lab-homepage
    environment:
      HOMEPAGE_ALLOWED_HOSTS: ${HOMEPAGE_HOSTNAME}
      PUID: ${USER_ID}
      PGID: ${GROUP_ID}
    ports:
      - ${HOMEPAGE_PORT}:3000
    volumes:
      - ${CONFIGS_FOLDER}/homepage:/app/config
      - ${BACKDROPS_FOLDER}:/app/public/images
      - type: bind
        source: ./homepage/docker.yaml
        target: /app/config/docker.yaml
      - type: bind
        source: ./homepage/bookmarks.yaml
        target: /app/config/bookmarks.yaml
      - type: bind
        source: ./homepage/services.yaml
        target: /app/config/services.yaml
      - type: bind
        source: ./homepage/widgets.yaml
        target: /app/config/widgets.yaml
      - type: bind
        source: ./homepage/settings.yaml
        target: /app/config/settings.yaml
      - type: bind
        source: ./homepage/custom.css
        target: /app/config/custom.css
      - type: bind
        source: ./homepage/custom.js
        target: /app/config/custom.js
      - ${HOMEPAGE_DISK_STATS_HOT}:/stats/hot
      - ${HOMEPAGE_DISK_STATS_COLD}:/stats/cold
    restart: unless-stopped
    networks:
      - tyr-lab-net
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://127.0.0.1:3000 || exit 1"]

  tyr-lab-glances:
    image: 'nicolargo/glances:ubuntu-latest-full'
    container_name: tyr-lab-glances
    pid: host
    privileged: true
    environment:
      - GLANCES_OPT=-w
      - DOCKER_HOST=tcp://tyr-lab-dockerproxy:2375
    ports:
      - ${GLANCES_PORT}:61208
    #volumes:
    #  - './glances/glances.conf:/glances/conf/glances.conf'
    volumes:
      - ${CONFIGS_FOLDER}/homepage:/stats/config
      - ${HOMEPAGE_DISK_STATS_HOT}:/stats/hot
      - ${HOMEPAGE_DISK_STATS_COLD}:/stats/cold
    restart: unless-stopped
    networks:
      - tyr-lab-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:61208/api/4/status"]

  tyr-lab-adguard:
    image: adguard/adguardhome:latest
    container_name: tyr-lab-adguard
    restart: unless-stopped
    ports:
      - 53:53/tcp
      - 53:53/udp
      - ${ADGUARD_SETUP_PORT}:3000/tcp
      - ${ADGUARD_WEB_PORT}:80/tcp
    volumes:
      - ${CONFIGS_FOLDER}/adguard/work:/opt/adguardhome/work
      - ${CONFIGS_FOLDER}/adguard/conf:/opt/adguardhome/conf
    networks:
      - tyr-lab-net
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://127.0.0.1:80 || exit 1"]

  tyr-lab-backdrops-sync:
    image: alpine:latest
    container_name: tyr-lab-backdrops-sync
    environment:
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY}
    command: sh -c 'apk add curl jq && while true; do /backdrops-sync.sh; sleep 300; done'
    volumes:
      - ./scripts/backdrops-sync.sh:/backdrops-sync.sh:ro
      - ${BACKDROPS_FOLDER}:/backdrops
    restart: unless-stopped
    network_mode: service:tyr-lab-gateway
    healthcheck:
      test: ["CMD", "true"]

  tyr-lab-backdrops-share:
    image: dockurr/samba
    container_name: tyr-lab-backdrops-share
    restart: unless-stopped
    volumes:
      - ${BACKDROPS_FOLDER}:/storage
    networks:
      lan:
        ipv4_address: ${BACKDROPS_SHARE_IP}
    environment:
      NAME: backdrops
      USER: ${BACKDROPS_SHARE_USER}
      PASS: ${BACKDROPS_SHARE_PASSWORD}
      UID: 1000
      GID: 1000

  tyr-lab-prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: tyr-lab-prowlarr
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIGS_FOLDER}/prowlarr:/config
    restart: unless-stopped
    network_mode: service:tyr-lab-gateway
    healthcheck:
      test: ["CMD-SHELL", "curl http://localhost:9696 || exit 1"]

  tyr-lab-flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: tyr-lab-flaresolverr
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=${TIMEZONE}
    restart: unless-stopped
    network_mode: service:tyr-lab-gateway
    healthcheck:
      test: ["CMD-SHELL", "curl http://localhost:8191 || exit 1"]

  tyr-lab-sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: tyr-lab-sonarr
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIGS_FOLDER}/sonarr:/config
      - ${HOT_FOLDER}:/hot
      - ${COLD_FOLDER}:/cold
      #- ${HOT_FOLDER}:/data # For compatibility.
    restart: unless-stopped
    network_mode: service:tyr-lab-gateway
    healthcheck:
      test: ["CMD-SHELL", "curl http://localhost:8989 || exit 1"]

  tyr-lab-radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: tyr-lab-radarr
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIGS_FOLDER}/radarr:/config
      - ${HOT_FOLDER}:/hot
      - ${COLD_FOLDER}:/cold
      #- ${HOT_FOLDER}:/data # For compatibility.
    restart: unless-stopped
    network_mode: service:tyr-lab-gateway
    healthcheck:
      test: ["CMD-SHELL", "curl http://localhost:7878 || exit 1"]

  tyr-lab-bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: tyr-lab-bazarr
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIGS_FOLDER}/bazarr:/config
      - ${HOT_FOLDER}:/hot
      - ${COLD_FOLDER}:/cold
      #- ${HOT_FOLDER}:/data # For compatibility.
    restart: unless-stopped
    network_mode: service:tyr-lab-gateway
    healthcheck:
      test: ["CMD-SHELL", "curl http://localhost:6767 || exit 1"]

  tyr-lab-qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: tyr-lab-qbittorrent
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIGS_FOLDER}/qbittorrent:/config
      - ${HOT_FOLDER}:/hot
      - ${COLD_FOLDER}:/cold
      #- ${HOT_FOLDER}:/data # For compatibility.
    restart: unless-stopped
    network_mode: service:tyr-lab-gateway
    healthcheck:
      test: ["CMD-SHELL", "curl http://localhost:8080 || exit 1"]

  tyr-lab-seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: tyr-lab-seerr
    environment:
      - LOG_LEVEL=debug
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIGS_FOLDER}/seerr:/app/config
    restart: unless-stopped
    network_mode: service:tyr-lab-gateway
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1

  tyr-lab-jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: tyr-lab-jellyfin
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ${CONFIGS_FOLDER}/jellyfin:/config
      - ${CACHE_FOLDER}/jellyfin:/cache
      - ${HOT_FOLDER}:/hot
      - ${COLD_FOLDER}:/cold
      #- ${HOT_FOLDER}:/data # For compatibility.
    restart: unless-stopped
    network_mode: service:tyr-lab-gateway
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl http://localhost:8096 || exit 1"]

  tyr-lab-kavita:
    image: lscr.io/linuxserver/kavita:latest
    container_name: tyr-lab-kavita
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIGS_FOLDER}/kavita:/config
      - ${HOT_FOLDER}:/hot
      - ${COLD_FOLDER}:/cold
      #- ${HOT_FOLDER}:/data # For compatibility.
    restart: unless-stopped
    network_mode: service:tyr-lab-gateway
    healthcheck:
      test: ["CMD-SHELL", "curl http://localhost:5000 || exit 1"]

  tyr-lab-jellystat-db:
    image: 'postgres:15.2'
    shm_size: 1gb
    container_name: tyr-lab-jellystat-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ${CONFIGS_FOLDER}/jellystat/pg:/var/lib/postgresql/data
    network_mode: service:tyr-lab-gateway
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]

  tyr-lab-jellystat:
    image: 'cyfershepard/jellystat:latest'
    container_name: tyr-lab-jellystat
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_IP: localhost
      POSTGRES_PORT: 5432
      JWT_SECRET: my-secret-jwt-key
      TZ: ${TIMEZONE}
    volumes:
      - ${CONFIGS_FOLDER}/jellystat/config:/app/config
    network_mode: service:tyr-lab-gateway
    depends_on:
      - tyr-lab-jellystat-db

  tyr-lab-kapowarr:
    container_name: tyr-lab-kapowarr
    image: mrcas/kapowarr:latest
    network_mode: service:tyr-lab-gateway
    restart: unless-stopped
    volumes:
      - ${CONFIGS_FOLDER}/kapowarr:/app/db
      - ${HOT_FOLDER}:/hot
      - ${COLD_FOLDER}:/cold
      #- ${HOT_FOLDER}:/data # For compatibility.
    healthcheck:
      test: ["CMD", "true"] # Kapowarr container doesn't have neither wget nor curl :(
