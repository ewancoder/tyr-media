        server: tyr-docker
        container: tyr-media-sonarr
        widget:
          type: sonarr
          url: http://tyr-media-gluetun:8989
          key: {{HOMEPAGE_VAR_SONARR_API_KEY}}
          enableQueue: true

    - Movies:
        icon: radarr.png
        href: http://asgard.local:7878
        description: Radarr - Movie manager
        server: tyr-docker
        container: tyr-media-radarr
        widget:
          type: radarr
          url: http://tyr-media-gluetun:7878
          key: {{HOMEPAGE_VAR_RADARR_API_KEY}}
          enableQueue: true

    - Subtitles:
        icon: bazarr.png
        href: http://asgard.local:6767
        description: Bazarr - Subtitle manager
        server: tyr-docker
        container: tyr-media-bazarr
        widget:
          type: bazarr
          url: http://tyr-media-gluetun:6767
          key: {{HOMEPAGE_VAR_BAZARR_API_KEY}}

    - Indexers:
        icon: prowlarr.png
        href: http://asgard.local:9696
        description: Prowlarr - Indexer manager
        server: tyr-docker
        container: tyr-media-prowlarr
        widget:
          type: prowlarr
          url: http://tyr-media-gluetun:9696
          key: {{HOMEPAGE_VAR_PROWLARR_API_KEY}}

    - Comics:
        icon: kapowarr.png
        href: http://asgard.local:5656
        description: Kapowarr - Comic manager
        server: tyr-docker
        container: tyr-media-kapowarr

    - VPN:
        icon: gluetun.png
        href: ""
        description: Gluetun - VPN gateway
        server: tyr-docker
        container: tyr-media-gluetun

    - FlareSolverr:
        icon: cloudflare.png
        href: ""
        description: FlareSolverr - Captcha solver
        server: tyr-docker
        container: tyr-media-flaresolverr

    - Ads blocking:
        icon: adguard-home.png
        href: http://asgard.local:23002
        description: AdGuard Home - DNS filtering
        siteMonitor: http://asgard.local:23002

- System Monitoring:
    - System Info:
        icon: glances.png
        href: http://asgard.local:61208
        description: Host overview
        server: tyr-docker
        container: tyr-media-glances
        widget:
          type: glances
          url: http://tyr-media-glances:61208
          version: 4
          metric: info

    - CPU Usage:
        icon: mdi-chip
        description: Processor utilization
        widget:
          type: glances
          url: http://tyr-media-glances:61208
          version: 4
          metric: cpu
          chart: true
          refreshInterval: 3000
          pointsLimit: 30

    - Memory Usage:
        icon: mdi-memory
        description: RAM utilization
        widget:
          type: glances
          url: http://tyr-media-glances:61208
          version: 4
          metric: memory
          chart: true
          refreshInterval: 3000
          pointsLimit: 30

    - Top Processes:
        icon: mdi-format-list-numbered
        description: CPU-intensive processes
        widget:
          type: glances
          url: http://tyr-media-glances:61208
          version: 4
          metric: process

    - GPU:
        icon: mdi-expansion-card
        description: AMD GPU usage
        widget:
          type: glances
          url: http://tyr-media-glances:61208
          version: 4
          metric: gpu:amd0
          chart: true
          refreshInterval: 3000

    - Network:
        icon: mdi-network
        description: Network throughput
        widget:
          type: glances
          url: http://tyr-media-glances:61208
          version: 4
          metric: network:eth0
          chart: true
          refreshInterval: 3000

    - Filesystem:
        icon: mdi-harddisk
        description: Root filesystem usage
        widget:
          type: glances
          url: http://tyr-media-glances:61208
          version: 4
          metric: fs:/etc/hostname

    - Docker Containers:
        icon: mdi-docker
        description: Running containers
        widget:
          type: glances
          url: http://tyr-media-glances:61208
          version: 4
          metric: containers

