- I/O and temps:
    - Network:
        widget:
          type: glances
          url: http://tyr-lab-glances:61208
          version: 4
          metric: network:eth0
    - HDD:
        widget:
          type: glances
          url: http://tyr-lab-glances:61208
          version: 4
          metric: disk:sda
    - GPU:
        widget:
          type: glances
          url: http://tyr-lab-glances:61208
          version: 4
          metric: gpu:nvidia0
    - CPU Temp:
        widget:
          type: glances
          url: http://tyr-lab-glances:61208
          version: 4
          metric: sensor:Package id 0
    - PCH Temp:
        widget:
          type: glances
          url: http://tyr-lab-glances:61208
          version: 4
          metric: sensor:pch_cannonlake 0
