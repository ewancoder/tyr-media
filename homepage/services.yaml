---
- System:
    - CPU:
        widget:
          type: glances
          url: http://{{HOMEPAGE_VAR_CONTAINER_GLANCES}}:61208
          version: 4
          metric: cpu
    - Memory:
        widget:
          type: glances
          url: http://{{HOMEPAGE_VAR_CONTAINER_GLANCES}}:61208
          version: 4
          metric: memory
    - Containers:
        widget:
          type: glances
          url: http://{{HOMEPAGE_VAR_CONTAINER_GLANCES}}:61208
          version: 4
          metric: containers
    - Processes:
        widget:
          type: glances
          url: http://{{HOMEPAGE_VAR_CONTAINER_GLANCES}}:61208
          version: 4
          metric: process

- Media:
    - Hot media:
        widget:
          type: glances
          url: http://{{HOMEPAGE_VAR_CONTAINER_GLANCES}}:61208
          version: 4
          metric: fs:/stats/hot

    - Request something:
        icon: seerr.png
        href: http://{{HOMEPAGE_VAR_DOMAIN}}:5055
        description: Seerr
        siteMonitor: http://{{HOMEPAGE_VAR_CONTAINER_GATEWAY}}:5055
        server: local
        container: {{HOMEPAGE_VAR_CONTAINER_SEERR}}

    - Watch something:
        icon: jellyfin.png
        href: http://{{HOMEPAGE_VAR_DOMAIN}}:8096
        description: Jellyfin
        siteMonitor: http://{{HOMEPAGE_VAR_CONTAINER_GATEWAY}}:8096
        server: local
        container: {{HOMEPAGE_VAR_CONTAINER_JELLYFIN}}

    - System state:
        icon: glances.png
        href: http://{{HOMEPAGE_VAR_DOMAIN}}:61208
        description: Glances
        siteMonitor: http://{{HOMEPAGE_VAR_CONTAINER_GLANCES}}:61208
        server: local
        container: {{HOMEPAGE_VAR_CONTAINER_GLANCES}}

    - Read something:
        icon: kavita.png
        href: http://{{HOMEPAGE_VAR_DOMAIN}}:10888
        description: Kavita
        siteMonitor: http://{{HOMEPAGE_VAR_CONTAINER_GATEWAY}}:5000
        server: local
        container: {{HOMEPAGE_VAR_CONTAINER_KAVITA}}

    - Track it:
        icon: trakt.png
        href: https://trakt.tv
        description: trakt.tv
        #siteMonitor: https://trakt.tv

    - Trakt app:
        icon: trakt.png
        href: https://app.trakt.tv
        description: app.trakt.tv
        #siteMonitor: https://app.trakt.tv

    - Statistics:
        icon: jellystat.png
        href: http://{{HOMEPAGE_VAR_DOMAIN}}:3000
        description: Jellystat
        siteMonitor: http://{{HOMEPAGE_VAR_CONTAINER_GATEWAY}}:3000
        server: local
        container: {{HOMEPAGE_VAR_CONTAINER_JELLYSTAT}}

- Management:
    - Torrents:
        icon: qbittorrent.png
        href: http://{{HOMEPAGE_VAR_DOMAIN}}:8080
        description: qBitTorrent
        siteMonitor: http://{{HOMEPAGE_VAR_CONTAINER_GATEWAY}}:8080
        showStats: true
        server: local
        container: {{HOMEPAGE_VAR_CONTAINER_QBITTORRENT}}
        widget:
          type: qbittorrent
          url: http://{{HOMEPAGE_VAR_CONTAINER_GATEWAY}}:8080

    - TV Shows Tracker:
        icon: sonarr.png
        href: http://{{HOMEPAGE_VAR_DOMAIN}}:8989
        description: Sonarr
        siteMonitor: http://{{HOMEPAGE_VAR_CONTAINER_GATEWAY}}:8989
        server: local
        container: {{HOMEPAGE_VAR_CONTAINER_SONARR}}

    - Movies Tracker:
        icon: radarr.png
        href: http://{{HOMEPAGE_VAR_DOMAIN}}:7878
        description: Radarr
        siteMonitor: http://{{HOMEPAGE_VAR_CONTAINER_GATEWAY}}:7878
        server: local
        container: {{HOMEPAGE_VAR_CONTAINER_RADARR}}

    - Subtitles Downloader:
        icon: bazarr.png
        href: http://{{HOMEPAGE_VAR_DOMAIN}}:6767
        description: Bazarr
        siteMonitor: http://{{HOMEPAGE_VAR_CONTAINER_GATEWAY}}:6767
        server: local
        container: {{HOMEPAGE_VAR_CONTAINER_BAZARR}}

    - Indexers setup:
        icon: prowlarr.png
        href: http://{{HOMEPAGE_VAR_DOMAIN}}:9696
        description: Prowlarr
        siteMonitor: http://{{HOMEPAGE_VAR_CONTAINER_GATEWAY}}:9696
        server: local
        container: {{HOMEPAGE_VAR_CONTAINER_PROWLARR}}

    - Comics setup:
        icon: kapowarr.png
        href: http://{{HOMEPAGE_VAR_DOMAIN}}:5656
        description: Kapowarr
        siteMonitor: http://{{HOMEPAGE_VAR_CONTAINER_GATEWAY}}:5656
        server: local
        container: {{HOMEPAGE_VAR_CONTAINER_KAPOWARR}}

    - Ads blocking:
        icon: adblock.png
        href: http://{{HOMEPAGE_VAR_ADGUARD_ADDRESS}}
        description: AdGuard
        siteMonitor: http://{{HOMEPAGE_VAR_CONTAINER_ADGUARD}}:80/login.html
        server: local
        container: {{HOMEPAGE_VAR_CONTAINER_ADGUARD}}

- Pet projects:
    - Seq logs:
        icon: seq.png
        href: https://seq.typingrealm.org
        description: Logging system for pet projects
        #siteMonitor: https://seq.typingrealm.org

    - PgAdmin:
        icon: pgadmin.png
        href: https://pgadmin.typingrealm.org
        description: PostgreSQL browser for pet projects
        #siteMonitor: https://pgadmin.typingrealm.org

    - Redis Insights:
        icon: redis.png
        href: https://redisinsight.typingrealm.org
        description: Redis browser for pet projects
        #siteMonitor: https://redisinsight.typingrealm.org

    - KartMan:
        icon: https://kartman.typingrealm.org/favicon.ico
        href: https://kartman.typingrealm.org
        description: Batumi karting manager
        #siteMonitor: https://kartman.typingrealm.com

    - Habits:
        icon: https://habits.typingrealm.org/favicon.ico
        href: https://habits.typingrealm.org
        description: Personal habits tracker
        #siteMonitor: https://habits.typingrealm.org

    - Nitrotype Tracker:
        icon: https://tnt.typingrealm.org/favicon.ico
        href: https://tnt.typingrealm.org
        description: Typing game tracker for KECATS team
        #siteMonitor: https://kecats.typingrealm.com

    - OverLab:
        icon: https://overlab.typingrealm.org/favicon.ico
        href: https://overlab.typingrealm.org
        description: Bodybuilding progress tracker
        #siteMonitor: https://overlab.typingrealm.org

- I/O and temps:
    - Network:
        widget:
          type: glances
          url: http://{{HOMEPAGE_VAR_CONTAINER_GLANCES}}:61208
          version: 4
          metric: network:eth0
    - HDD:
        widget:
          type: glances
          url: http://{{HOMEPAGE_VAR_CONTAINER_GLANCES}}:61208
          version: 4
          metric: disk:sda
    - GPU:
        widget:
          type: glances
          url: http://{{HOMEPAGE_VAR_CONTAINER_GLANCES}}:61208
          version: 4
          metric: gpu:nvidia0
    - CPU Temp:
        widget:
          type: glances
          url: http://{{HOMEPAGE_VAR_CONTAINER_GLANCES}}:61208
          version: 4
          metric: sensor:Package id 0
    - PCH Temp:
        widget:
          type: glances
          url: http://{{HOMEPAGE_VAR_CONTAINER_GLANCES}}:61208
          version: 4
          metric: sensor:pch_cannonlake 0
