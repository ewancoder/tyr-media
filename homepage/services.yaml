---

- Media:
    - Request something:
        icon: overseerr.png
        href: http://asgard.local:5055
        description: Seerr - Request movies & TV shows
        server: tyr-docker
        container: tyr-media-seerr
        widget:
          type: overseerr
          url: http://tyr-media-gluetun:5055
          key: {{HOMEPAGE_VAR_SEERR_API_KEY}}

    - Watch something:
        icon: jellyfin.png
        href: http://asgard.local:8096
        description: Jellyfin - Stream your media
        server: tyr-docker
        container: tyr-media-jellyfin
        widget:
          type: jellyfin
          url: http://tyr-media-gluetun:8096
          key: {{HOMEPAGE_VAR_JELLYFIN_API_KEY}}
          enableBlocks: true
          enableNowPlaying: true

    - Read something:
        icon: kavita.png
        href: http://asgard.local:10888
        description: Kavita - Digital library
        server: tyr-docker
        container: tyr-media-kavita
        widget:
          type: kavita
          url: http://tyr-media-gluetun:5000
          username: {{HOMEPAGE_VAR_KAVITA_USERNAME}}
          password: {{HOMEPAGE_VAR_KAVITA_PASSWORD}}

    - Statistics:
        icon: jellystat.png
        href: http://asgard.local:3000
        description: Jellystat - Viewing statistics
        server: tyr-docker
        container: tyr-media-jellystat
        widget:
          type: jellystat
          url: http://tyr-media-gluetun:3000
          key: {{HOMEPAGE_VAR_JELLYSTAT_API_KEY}}

    - Track it:
        icon: trakt.png
        href: https://trakt.tv
        description: trakt.tv
        siteMonitor: https://trakt.tv

    - Trakt app:
        icon: trakt.png
        href: https://app.trakt.tv
        description: app.trakt.tv
        siteMonitor: https://app.trakt.tv

- Management:
    - Torrents:
        icon: qbittorrent.png
        href: http://asgard.local:8080
        description: qBittorrent - Download client
        server: tyr-docker
        container: tyr-media-qbittorrent
        widget:
          type: qbittorrent
          url: http://tyr-media-gluetun:8080
          username: {{HOMEPAGE_VAR_QBITTORRENT_USERNAME}}
          password: {{HOMEPAGE_VAR_QBITTORRENT_PASSWORD}}

    - TV Shows:
        icon: sonarr.png
        href: http://asgard.local:8989
