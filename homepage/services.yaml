---
- System:
    - CPU:
        widget:
          type: glances
          url: http://tyr-lab-glances:61208
          version: 4
          metric: cpu
    - Memory:
        widget:
          type: glances
          url: http://tyr-lab-glances:61208
          version: 4
          metric: memory
    - Containers:
        widget:
          type: glances
          url: http://tyr-lab-glances:61208
          version: 4
          metric: containers
    - Processes:
        widget:
          type: glances
          url: http://tyr-lab-glances:61208
          version: 4
          metric: process

- Media:
    - Hot media:
        widget:
          type: glances
          url: http://tyr-lab-glances:61208
          version: 4
          metric: fs:/stats/hot

    - Request something:
        icon: seerr.png
        href: http://asgard.local:5055
        description: Seerr
        siteMonitor: http://tyr-lab-gateway:5055
        server: local
        container: tyr-lab-seerr

    - Watch something:
        icon: jellyfin.png
        href: http://asgard.local:8096
        description: Jellyfin
        siteMonitor: http://tyr-lab-gateway:8096
        server: local
        container: tyr-lab-jellyfin

    - System state:
        icon: glances.png
        href: http://asgard.local:61208
        description: Glances
        siteMonitor: http://tyr-lab-glances:61208
        server: local
        container: tyr-lab-glances

    - Read something:
        icon: kavita.png
        href: http://asgard.local:10888
        description: Kavita
        siteMonitor: http://tyr-lab-gateway:5000
        server: local
        container: tyr-lab-kavita

    - Track it:
        icon: trakt.png
        href: https://trakt.tv
        description: trakt.tv
        #siteMonitor: https://trakt.tv

    - Trakt app:
        icon: trakt.png
        href: https://app.trakt.tv
        description: app.trakt.tv
        #siteMonitor: https://app.trakt.tv

    - Statistics:
        icon: jellystat.png
        href: http://asgard.local:3000
        description: Jellystat
        siteMonitor: http://tyr-lab-gateway:3000
        server: local
        container: tyr-lab-jellystat

